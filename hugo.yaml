baseURL: "https://ApolloMonasa.github.io/TechBlogs/"
title: TechBlogs
theme: PaperMod
languageCode: "zh-cn"
defaultContentLanguage: "zh"

canonifyURLs: true


pagination.pagerSize: 5

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

outputs:
  home:
    - HTML
    - RSS
    - JSON

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production
  title: TechBlogs
  description: "ApolloMonasa's Tech Blog"
  keywords: [Blog, Java, NeoForge, PaperMod]
  author: ApolloMonasa
  DateFormat: "2006-01-02"
  defaultTheme: auto
  disableThemeToggle: false

  # 【新增】关键设置：定义哪些文件夹的内容算作“主文章”
  # 如果你不加这行，Hugo 默认只显示文章最多的那个文件夹（通常只显示 posts，不显示 docs）
  # 加上这行，首页列表就会同时包含 posts 和 docs 里的最近文章
  mainSections: 
    - posts
    - docs

  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: true
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: true

  assets:
    favicon: "imgs/mitsubishi.svg"
    favicon16x16: "favicon-16x16.png"
    favicon32x32: "favicon-32x32.png"
    searchIndex: "index.json"

  label:
    text: "TechBlogs"
    icon: imgs/network-switch.png
    iconHeight: 35

  # -----------------------------------------------------------------------
  # 【修改】关闭 Profile Mode (个人简介模式)
  # 必须设为 false，否则文章列表会被原本的个人卡片挡住！
  # -----------------------------------------------------------------------
  profileMode:
    enabled: false 
    title: ApolloMonasa
    subtitle: "Focus on DataBase-Tech"
    imageUrl: "https://github.com/ApolloMonasa.png"
    imageWidth: 120
    imageHeight: 120
    imageTitle: Me
    buttons:
      - name: 文章列表
        url: posts/
      - name: 标签
        url: tags/

  # -----------------------------------------------------------------------
  # 【开启】Home Info Mode (列表模式)
  # 关闭上面的 Profile 后，你需要在这里配置首页顶部的欢迎语
  # 如果留空，首页就只显示干巴巴的文章列表
  # -----------------------------------------------------------------------
  homeInfoParams:
    Title: "Hi there \U0001F44B"
    Content: "Welcome to my Tech Blog. 这里记录我的个人开发笔记。"

  socialIcons:
    - name: github
      url: "https://github.com/ApolloMonasa"
    - name: bilibili
      url: "https://space.bilibili.com/1029459856"

  cover:
    hidden: true
    hiddenInList: true
    hiddenInSingle: true

  editPost:
    URL: "https://github.com/ApolloMonasa/TechBlogs/tree/main/content"
    Text: "Suggest Changes"
    appendFilePath: true

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    limit: 10
    keys: ["title", "permalink", "summary", "content", "tags"]

menu:
  main:
    - identifier: categories
      name: 分类
      url: categories/
      weight: 10
    - identifier: tags
      name: 标签
      url: tags/
      weight: 20
    - identifier: archives
      name: 归档
      url: archives/
      weight: 30
    - identifier: search
      name: 搜索
      url: search/
      weight: 40

pygmentsUseClasses: true
markup:
  highlight:
    noClasses: false
    anchorLineNos: true
    codeFences: true
    guessSyntax: true
    lineNos: true
    style: github