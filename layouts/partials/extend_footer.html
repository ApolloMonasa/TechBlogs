<!-- <script>

        const containers = document.querySelectorAll('.highlight');

        containers.forEach(container => {

            // 3. 创建按钮

            // 4. 绑定点击事件
            copyButton.addEventListener('click', () => {
                // 核心逻辑：尝试找到容器里的文本内容

                let codeToCopy = '';

                if (codeBlock) {
                    codeToCopy = codeBlock.innerText;
                } else {

                    codeToCopy = container.innerText;
                }

                // 执行复制

                    console.error('Copy failed: ', err);

            container.style.position = 'relative'; // 确保父容器是定位基准

        });
    });
</script>

<style>
